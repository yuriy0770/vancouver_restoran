version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-dev-key-2024
      - DB_HOST=db
      - DB_NAME=canada
      - DB_USER=postgres
      - DB_PASSWORD=password
      - TELEGRAM_BOT_TOKEN=8463784520:AAFu4JKmjvACSXowt-fFksBGgS_t4j1v2UQ
      - TELEGRAM_CHAT_ID=6958740602
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=canada
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  static_volume:
  media_volume: