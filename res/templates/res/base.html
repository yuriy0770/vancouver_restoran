<!doctype html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Maple Leaf{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="{% url 'res:index' %}">Maple Leaf</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
                aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'res:index' %}">Главная</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'res:menu' %}">Меню</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'res:about' %}">О нас</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'res:reviews_list' %}">Отзывы</a></li>
                <li><a href="{% url 'reservations:reservation' %}" class="btn btn-primary">🍁 Забронировать стол</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div style="padding-bottom: 100px;">{% block content %}{% endblock %}</div>

</main>

<footer class="bg-dark text-light py-4 mt-3 fixed-bottom" >
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h6 class="mb-1">Maple Leaf</h6>
                <p class="small mb-0">Адрес: 123 Vancouver St, Vancouver – Тел: +1 (604) 123-4567</p>
            </div>
            <div class="col-md-6 text-md-end mt-3 mt-md-0">
                <a href="{% url 'res:about' %}" class="text-light small text-decoration-none me-3">О нас</a>
                <a href="{% url 'res:reviews_list' %}" class="text-light small text-decoration-none me-3">Отзывы</a>
                <a href="{% url 'res:menu' %}" class="text-light small text-decoration-none">Меню</a>
            </div>
        </div>
    </div>
</footer>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
